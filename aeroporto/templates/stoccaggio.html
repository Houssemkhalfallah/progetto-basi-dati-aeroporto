<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Stoccaggio</title>

    <style>
        *{ margin:0; padding:0; box-sizing:border-box; font-family:Arial; }

        body{
            min-height:100vh;
            display:flex;
            flex-direction:column;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color:white;
        }

        .navbar{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:15px 25px;
            background:rgba(0,0,0,0.5);
            backdrop-filter:blur(10px);
            border-bottom:1px solid rgba(255,255,255,0.15);
        }

        .title{ font-weight:bold; }
        .nav-buttons{ display:flex; gap:10px; }
        .nav-buttons a{ text-decoration:none; }

        .nav-buttons button{
            padding:8px 12px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-weight:bold;
            background:#0077b6;
            color:white;
            transition:0.2s;
        }

        .nav-buttons button:hover{ background:#0096c7; }

        .container-wrap{ flex:1; padding:25px; overflow-x:auto; }

        h1{ margin-bottom:20px; }

        .messages{
            margin-bottom:20px;
            background:rgba(255,255,255,0.08);
            padding:12px;
            border-radius:10px;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:rgba(255,255,255,0.08);
            border-radius:14px;
            overflow:hidden;
            backdrop-filter:blur(6px);
        }

        th, td{ padding:12px; text-align:center; white-space:nowrap; }
        th{ background:rgba(0,119,182,0.55); font-size:14px; }
        tr:nth-child(even){ background:rgba(255,255,255,0.10); }

        td a{ color:#90e0ef; text-decoration:none; font-weight:bold; margin:0 5px; }
        td a:hover{ text-decoration:underline; }
    </style>
</head>

<body>

<div class="navbar">
    <div class="title">Merci stoccate nel magazzino {{nome}} in {{posizione}}</div>
    <div class="nav-buttons">
        <a href="/magazzino/stoccaggio/aggiungi/{{nome}}/{{posizione}}"><button type="button">Aggiungi Merce</button></a>
        <a href="/magazzino"><button type="button">Ritorna alla Dashboard</button></a>
    </div>
</div>

<div class="container-wrap">

    {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <p>{{ message }}</p>
            {% endfor %}
        </div>
    {% endif %}

    <table>
        <tr>
            <th>SSCC</th>
            <th>Peso</th>
            <th>Paese</th>
            <th>Categoria</th>
            <th>Azioni</th>
        </tr>

        {% for m in merce %}
        <tr>
            <td>{{m.sscc}}</td>
            <td>{{m.peso}}</td>
            <td>{{m.paese}}</td>
            <td>{{m.categoria}}</td>
            <td>
                <a href="/magazzino/stoccaggio/modifica/{{m.sscc}}">Sposta</a>
                <a href="/magazzino/stoccaggio/elimina/{{m.sscc}}">Rimuovi</a>
            </td>
        </tr>
        {% endfor %}
    </table>

</div>

</body>
</html>
