{% load static %}
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Registrazione</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

           background:
    linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
    url('{% static "aeroporto/img/sfondo.jpg" %}');
background-size: cover;
background-position: center;
background-attachment: fixed;
            color: white;
        }

        .register-container{
            width: 430px;
            padding: 40px;

            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(10px);

            border: 1px solid rgba(255,255,255,0.18);
            border-radius: 20px;

            box-shadow: 0 8px 32px rgba(0,0,0,0.35);
        }

        h1{
            text-align: center;
            margin-bottom: 35px;
            font-size: 34px;
            letter-spacing: 1px;
        }

        form label{
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        form input,
        form select{
            width: 100%;
            padding: 12px;

            border: none;
            border-radius: 10px;

            margin-bottom: 22px;

            background: rgba(255,255,255,0.92);
            color: #222;

            font-size: 15px;
        }

        form input:focus,
        form select:focus{
            outline: none;
            box-shadow: 0 0 0 3px rgba(0,180,255,0.4);
        }

        .button-group{
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        button{
            flex: 1;
            padding: 12px;

            border: none;
            border-radius: 10px;

            font-size: 15px;
            font-weight: bold;

            cursor: pointer;
            transition: 0.25s;
        }

        button[type="submit"]{
            background: #0077b6;
            color: white;
        }

        button[type="submit"]:hover{
            background: #0096c7;
            transform: translateY(-2px);
        }

        button[type="reset"]{
            background: #adb5bd;
            color: #222;
        }

        button[type="reset"]:hover{
            background: #ced4da;
            transform: translateY(-2px);
        }

        .error{
            margin-top: 25px;
            padding: 12px;

            border-radius: 10px;

            background: rgba(255,0,0,0.18);
            border: 1px solid rgba(255,0,0,0.35);

            text-align: center;
        }

        .login-section{
            margin-top: 30px;
            text-align: center;
        }

        .login-section a{
            text-decoration: none;
        }

        .login-btn{
            margin-top: 15px;
            width: 100%;

            background: #023e8a;
            color: white;
        }

        .login-btn:hover{
            background: #0353a4;
            transform: translateY(-2px);
        }
    </style>
</head>

<body>

    <div class="register-container">

        <h1>Registrazione</h1>

        <form method="POST" action="/">
            {% csrf_token %}

            <label for="username">Username</label>
            <input type="text" name="username" id="username" required>

            <label for="password">Password</label>
            <input type="password" name="password" id="password" required>

            <label for="password2">Conferma Password</label>
            <input type="password" name="password2" id="password2" required>

            <label for="ruolo">Seleziona il tuo ruolo</label>

            <select name="ruolo" id="ruolo" required>
                <option disabled selected value> --- </option>
                <option value="passeggero">Passeggero</option>
                <option value="gestore_gate">Gestore Gate</option>
                <option value="gestore_aerei_trasporto_merci">Gestore Aerei Trasporto Merci</option>
                <option value="gestore_aerei_passeggeri">Gestore Aerei Passeggeri</option>
                <option value="gestore_magazzino_aeroportuale">Gestore Magazzino Aeroportuale</option>
            </select>

            <div class="button-group">
                <button type="submit">Registrati</button>
                <button type="reset">Reset</button>
            </div>

        </form>

        {% if error %}
            <div class="error">
                {{ error }}
            </div>
        {% endif %}

        <div class="login-section">
            <p>Hai già un account?</p>

            <a href="/login" class="login-btn" style="display:inline-block; text-decoration:none; text-align:center;">
                Login
            </a>
        </div>

    </div>

</body>
</html>
