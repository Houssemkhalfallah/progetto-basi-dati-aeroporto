<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Prenotazione Posto</title>

    <style>
        *{ margin:0; padding:0; box-sizing:border-box; font-family:Arial; }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color:white;
        }

        .card{
            width:480px;
            padding:35px;
            background:rgba(255,255,255,0.10);
            border-radius:20px;
            backdrop-filter:blur(10px);
            border:1px solid rgba(255,255,255,0.18);
            box-shadow:0 8px 32px rgba(0,0,0,0.35);
        }

        h1{ text-align:center; margin-bottom:25px; font-size:26px; }

        form{ display:flex; flex-direction:column; }

        label{ margin-bottom:8px; font-weight:bold; }

        input{
            margin-bottom:20px;
            padding:10px 12px;
            border:none;
            border-radius:10px;
            background:rgba(255,255,255,0.92);
            font-size:14px;
        }

        .price{
            margin-bottom:20px;
            padding:12px;
            background:rgba(0,180,255,0.18);
            border-radius:10px;
            font-weight:bold;
            text-align:center;
        }

        .checkbox{
            display:flex;
            align-items:center;
            gap:8px;
            margin-bottom:20px;
        }

        .checkbox input{ width:auto; margin:0; }

        button{
            padding:10px 14px;
            border:none;
            border-radius:10px;
            cursor:pointer;
            font-weight:bold;
            transition:0.2s;
            margin-bottom:10px;
        }

        .primary{ background:#0077b6; color:white; }
        .primary:hover{ background:#0096c7; transform:translateY(-2px); }

        .reset{ background:#023e8a; color:white; }
        .reset:hover{ background:#0353a4; transform:translateY(-2px); }

        .cancel{ margin-top:8px; text-align:center; }
        .cancel button{ background:rgba(255,255,255,0.15); color:white; width:100%; }
        .cancel button:hover{ background:rgba(255,255,255,0.25); transform:translateY(-2px); }

        .error{ color:#ffb4b4; margin-bottom:15px; font-weight:bold; }
    </style>
</head>

<body>

<div class="card">

    <h1>
        Prenotazione posto {{posto.numero}} <br>
        Aereo {{posto.codice_icao_id}}
    </h1>

    {% if error %}
        <div class="error">Errore: {{ error }}</div>
    {% endif %}

    <form method="POST" action="/passeggero/prenotazione/aggiungi/{{posto.codice_icao_id}}/{{posto.numero}}">

        {% csrf_token %}

        <div class="price">
            Prezzo: {{prezzo}}
        </div>

        <div class="checkbox">
            <input type="checkbox" name="bagaglio_extra" id="bagaglio_extra" value="1">
            <label for="bagaglio_extra">Bagaglio extra</label>
        </div>

        <label for="data_inizio">Data inizio:</label>
        <input type="date" name="data_inizio" id="data_inizio" value="{{itinerario.data_inizio|date:'Y-m-d'}}" required>

        <label for="data_fine">Data fine:</label>
        <input type="date" name="data_fine" id="data_fine" value="{{itinerario.data_fine|date:'Y-m-d'}}" required>

        <button type="submit" class="primary">Prenota</button>
        <button type="reset" class="reset">Reset</button>

    </form>

    <div class="cancel">
        <a href="/passeggero/prenotazione">
            <button type="button">Annulla</button>
        </a>
    </div>

</div>

</body>
</html>
