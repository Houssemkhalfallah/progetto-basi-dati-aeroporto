<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Aggiunta Aereo Passeggeri</title>

    <style>
        *{ margin:0; padding:0; box-sizing:border-box; font-family:Arial; }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color:white;
            padding:30px 0;
        }

        .card{
            width:500px;
            padding:35px;
            background:rgba(255,255,255,0.10);
            border-radius:20px;
            backdrop-filter:blur(10px);
            border:1px solid rgba(255,255,255,0.18);
            box-shadow:0 8px 32px rgba(0,0,0,0.35);
        }

        h1{ text-align:center; margin-bottom:25px; font-size:26px; }

        form{ display:flex; flex-direction:column; }

        label{ margin-bottom:8px; font-weight:bold; }

        input, select{
            margin-bottom:18px;
            padding:10px 12px;
            border:none;
            border-radius:10px;
            background:rgba(255,255,255,0.92);
            font-size:14px;
        }

        .button-group{ display:flex; gap:10px; margin-top:5px; }

        button{
            padding:10px 14px;
            border:none;
            border-radius:10px;
            cursor:pointer;
            font-weight:bold;
            transition:0.2s;
        }

        .primary{ background:#0077b6; color:white; }
        .primary:hover{ background:#0096c7; transform:translateY(-2px); }

        .secondary{ background:#023e8a; color:white; }
        .secondary:hover{ background:#0353a4; transform:translateY(-2px); }

        .cancel{ margin-top:18px; text-align:center; }
        .cancel button{ background:rgba(255,255,255,0.15); color:white; width:100%; }
        .cancel button:hover{ background:rgba(255,255,255,0.25); transform:translateY(-2px); }

        .error{ color:#ffb4b4; margin-bottom:15px; font-weight:bold; }
    </style>
</head>

<body>

<div class="card">

    <h1>Aggiunta Aereo Passeggeri</h1>

    {% if error %}
        <div class="error">Errore: {{ error }}</div>
    {% endif %}

    <form method="POST" action="/aereo_passeggeri/aggiungi">

        {% csrf_token %}

        <label for="codice_icao">Codice ICAO:</label>
        <input type="text" id="codice_icao" name="codice_icao" maxlength="10" required>

        <label for="modello">Modello:</label>
        <input type="text" id="modello" name="modello" required>

        <label for="compagnia">Compagnia:</label>
        <input type="text" id="compagnia" name="compagnia" required>

        <label for="altezza">Altezza (m):</label>
        <input type="number" step="any" min="0.0" id="altezza" name="altezza" required>

        <label for="lunghezza">Lunghezza (m):</label>
        <input type="number" step="any" min="0.0" id="lunghezza" name="lunghezza" required>

        <label for="apertura_alare">Apertura alare (m):</label>
        <input type="number" step="any" min="0.0" id="apertura_alare" name="apertura_alare" required>

        <label for="capienza">Capienza (numero posti):</label>
        <input type="number" min="0" id="capienza" name="capienza" required>

        <label for="id_itinerario">Itinerario (opzionale):</label>
        <select id="id_itinerario" name="id_itinerario">
            <option value="">Nessuno</option>
            {% for i in itinerari %}
            <option value="{{i.id}}">{{i.destinazione}} ({{i.data_inizio}} - {{i.data_fine}})</option>
            {% endfor %}
        </select>

        <div class="button-group">
            <button type="submit" class="primary">Aggiungi</button>
            <button type="reset" class="secondary">Reset</button>
        </div>

    </form>

    <div class="cancel">
        <a href="/aereo_passeggeri">
            <button type="button">Annulla</button>
        </a>
    </div>

</div>

</body>
</html>
