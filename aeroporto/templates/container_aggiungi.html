<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Aggiunta Container</title>

    <style>
        *{ margin:0; padding:0; box-sizing:border-box; font-family:Arial; }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color:white;
            padding:30px 0;
        }

        .card{
            width:480px;
            padding:35px;
            background:rgba(255,255,255,0.10);
            border-radius:20px;
            backdrop-filter:blur(10px);
            border:1px solid rgba(255,255,255,0.18);
            box-shadow:0 8px 32px rgba(0,0,0,0.35);
        }

        h1{ text-align:center; margin-bottom:25px; font-size:24px; }

        form{ display:flex; flex-direction:column; }

        label{ margin-bottom:8px; font-weight:bold; }

        input{
            margin-bottom:18px;
            padding:10px 12px;
            border:none;
            border-radius:10px;
            background:rgba(255,255,255,0.92);
            font-size:14px;
        }

        .hint{ font-size:12px; opacity:0.75; margin:-12px 0 14px; }

        .button-group{ display:flex; gap:10px; margin-top:5px; }

        button{
            padding:10px 14px;
            border:none;
            border-radius:10px;
            cursor:pointer;
            font-weight:bold;
            transition:0.2s;
        }

        .primary{ background:#0077b6; color:white; }
        .primary:hover{ background:#0096c7; transform:translateY(-2px); }

        .secondary{ background:#023e8a; color:white; }
        .secondary:hover{ background:#0353a4; transform:translateY(-2px); }

        .cancel{ margin-top:18px; text-align:center; }
        .cancel button{ background:rgba(255,255,255,0.15); color:white; width:100%; }
        .cancel button:hover{ background:rgba(255,255,255,0.25); transform:translateY(-2px); }

        .error{ color:#ffb4b4; margin-bottom:15px; font-weight:bold; }
    </style>
</head>

<body>

<div class="card">

    <h1>Aggiunta Container su {{codice_icao}}</h1>

    {% if error %}
        <div class="error">Errore: {{ error }}</div>
    {% endif %}

    <form method="POST" action="/aereo_merci/container/aggiungi/{{codice_icao}}">

        {% csrf_token %}

        <label for="id">ID Container:</label>
        <input type="text" id="id" name="id" maxlength="11" placeholder="es. DHLX1234567" required>
        <div class="hint">4 lettere maiuscole + 7 numeri</div>

        <label for="capacita">Capacità:</label>
        <input type="number" step="any" min="0.0" id="capacita" name="capacita" required>

        <label for="compagnia_logistica">Compagnia logistica:</label>
        <input type="text" id="compagnia_logistica" name="compagnia_logistica" placeholder="es. DHL, FedEx, UPS" required>

        <label for="data_inizio">Data inizio trasporto:</label>
        <input type="date" id="data_inizio" name="data_inizio" required>

        <label for="data_fine">Data fine trasporto:</label>
        <input type="date" id="data_fine" name="data_fine" required>

        <label for="destinazione">Destinazione:</label>
        <input type="text" id="destinazione" name="destinazione" required>

        <div class="button-group">
            <button type="submit" class="primary">Aggiungi</button>
            <button type="reset" class="secondary">Reset</button>
        </div>

    </form>

    <div class="cancel">
        <a href="/aereo_merci/container/{{codice_icao}}">
            <button type="button">Annulla</button>
        </a>
    </div>

</div>

</body>
</html>
