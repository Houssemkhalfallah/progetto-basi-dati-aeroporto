<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Modifica Password</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            min-height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
        }

        .password-container{
            width: 460px;
            padding: 40px;

            background: rgba(255,255,255,0.12);
            backdrop-filter: blur(10px);

            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.18);

            box-shadow: 0 8px 32px rgba(0,0,0,0.35);
        }

        h1{
            text-align: center;
            margin-bottom: 35px;

            font-size: 34px;
            letter-spacing: 1px;
        }

        form label{
            display: block;
            margin-bottom: 8px;

            font-weight: bold;
        }

        form input{
            width: 100%;
            padding: 12px;

            margin-bottom: 22px;

            border: none;
            border-radius: 10px;

            background: rgba(255,255,255,0.92);
            color: #222;

            font-size: 15px;
        }

        button{
            width: 100%;
            padding: 13px;

            border: none;
            border-radius: 10px;

            font-size: 15px;
            font-weight: bold;

            cursor: pointer;
            transition: 0.25s;

            background: #0077b6;
            color: white;
        }

        button:hover{
            background: #0096c7;
            transform: translateY(-2px);
        }

        .error{
            margin-top: 25px;
            padding: 12px;

            border-radius: 10px;

            background: rgba(255,0,0,0.18);
            border: 1px solid rgba(255,0,0,0.35);

            text-align: center;
        }
    </style>
</head>

<body>

    <div class="password-container">

        <h1>Modifica Password</h1>

        <form method="POST" action="/modifica_password">
            {% csrf_token %}

            <label for="password_vecchia">Password attuale</label>
            <input type="password" name="password_vecchia" id="password_vecchia" required>

            <label for="password_nuova">Nuova password</label>
            <input type="password" name="password_nuova" id="password_nuova" required>

            <label for="password_nuova_conferma">Conferma nuova password</label>
            <input type="password" name="password_nuova_conferma" id="password_nuova_conferma" required>

            <button type="submit">Salva</button>
        </form>

        {% if error %}
            <div class="error">
                {{ error }}
            </div>
        {% endif %}

    </div>

</body>
</html>
